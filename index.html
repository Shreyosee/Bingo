<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Picker</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,215,0,0.12), transparent 30%),
        linear-gradient(135deg, #120b05, #1f1408 45%, #0d0a07);
      color: #fff;
      padding: 24px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .casino-card {
      background: linear-gradient(180deg, rgba(35,22,10,0.95), rgba(18,10,5,0.96));
      border: 2px solid #d4af37;
      border-radius: 28px;
      padding: 28px;
      box-shadow:
        0 0 0 2px rgba(255,215,0,0.12) inset,
        0 25px 70px rgba(0,0,0,0.45),
        0 0 25px rgba(212,175,55,0.15);
    }

    h1 {
      text-align: center;
      margin: 0 0 20px;
      font-size: 38px;
      color: #ffd700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255,215,0,0.35);
    }

    .top-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .top-panel h3,
    .pool-title {
      margin: 0 0 12px;
      color: #f7d774;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .selected-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 48px;
    }

    .chip {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      background:
        radial-gradient(circle at 30% 30%, #ff6666, #b30000 65%, #680000);
      border: 3px dashed #ffe7a3;
      box-shadow:
        0 0 12px rgba(255,75,75,0.35),
        inset 0 0 8px rgba(255,255,255,0.18);
    }

    .machine {
      text-align: center;
      border-radius: 24px;
      padding: 28px 20px;
      margin-bottom: 24px;
      background:
        radial-gradient(circle at center, rgba(255,215,0,0.10), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,215,0,0.18);
    }

    .status {
      min-height: 24px;
      margin-bottom: 16px;
      color: #ffe7a3;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .slot-window {
      width: 220px;
      height: 220px;
      margin: 0 auto 20px;
      border-radius: 24px;
      border: 4px solid #ffd700;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, #fff8dc 0%, #f7d774 45%, #7a4a00 100%);
      color: #2b1700;
      font-size: 82px;
      font-weight: 900;
      box-shadow:
        0 0 24px rgba(255,215,0,0.35),
        inset 0 0 16px rgba(255,255,255,0.35);
      text-shadow: 0 2px 0 rgba(255,255,255,0.2);
    }

    .slot-window.spinning {
      animation: slotPulse 0.12s linear infinite;
    }

    @keyframes slotPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .spin-btn {
      border: none;
      cursor: pointer;
      padding: 16px 34px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 900;
      color: #2b1700;
      background: linear-gradient(180deg, #ffd700, #d4af37);
      box-shadow:
        0 10px 25px rgba(212,175,55,0.35),
        inset 0 1px 0 rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }

    .spin-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .spin-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pool {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 18px;
      padding: 16px;
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .ball {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      transition: all 0.18s ease;
    }

    .ball.active {
      color: #2b1700;
      background:
        radial-gradient(circle at 35% 30%, #fff, #ffd700 60%, #c28f00);
      border: 2px solid #ffe7a3;
      box-shadow: 0 8px 18px rgba(0,0,0,0.3);
    }

    .ball.highlight {
      transform: scale(1.12);
      box-shadow:
        0 0 18px rgba(255,215,0,0.55),
        0 10px 22px rgba(0,0,0,0.35);
    }

    .ball.disabled {
      background: #4b3b25;
      color: #a59167;
      border: 2px solid #77603c;
      opacity: 0.55;
      text-decoration: line-through;
      box-shadow: none;
    }

    @media (max-width: 640px) {
      h1 { font-size: 28px; }
      .slot-window {
        width: 170px;
        height: 170px;
        font-size: 60px;
      }
      .ball {
        width: 52px;
        height: 52px;
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="casino-card">
      <h1>Number Picker</h1>

      <div class="top-panel">
        <h3>Winning Numbers</h3>
        <div class="selected-list" id="selectedList"></div>
      </div>

      <div class="machine">
        <div class="status" id="status">Press SPIN to draw a number</div>
        <div class="slot-window" id="slotWindow">--</div>
        <button class="spin-btn" id="spinBtn">SPIN</button>
      </div>

      <div class="pool">
        <div class="pool-title">Numbers In Play</div>
        <div class="balls" id="balls"></div>
      </div>
    </div>
  </div>

  <script>
    const allNumbers = Array.from({ length: 25 }, (_, i) => i + 1);
    let remainingNumbers = [...allNumbers];
    let winners = [];
    let spinning = false;

    const selectedList = document.getElementById("selectedList");
    const balls = document.getElementById("balls");
    const spinBtn = document.getElementById("spinBtn");
    const slotWindow = document.getElementById("slotWindow");
    const status = document.getElementById("status");

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function renderWinners() {
      selectedList.innerHTML = "";
      winners.forEach(num => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = num;
        selectedList.appendChild(chip);
      });
    }

    function renderBalls(highlight = null) {
      balls.innerHTML = "";
      allNumbers.forEach(num => {
        const ball = document.createElement("div");
        ball.className = "ball";

        if (winners.includes(num)) {
          ball.classList.add("disabled");
        } else {
          ball.classList.add("active");
        }

        if (highlight === num && !winners.includes(num)) {
          ball.classList.add("highlight");
        }

        ball.textContent = num;
        balls.appendChild(ball);
      });
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function spin() {
      if (spinning || remainingNumbers.length === 0) return;

      spinning = true;
      spinBtn.disabled = true;
      slotWindow.classList.add("spinning");
      status.textContent = "Spinning...";

      const loopNumbers = shuffle(remainingNumbers);

      for (let i = 0; i < 24; i++) {
        const current = loopNumbers[i % loopNumbers.length];
        slotWindow.textContent = current;
        renderBalls(current);
        await wait(85);
      }

      const winningNumber = shuffle(remainingNumbers)[0];

      winners.push(winningNumber);
      remainingNumbers = remainingNumbers.filter(n => n !== winningNumber);

      slotWindow.classList.remove("spinning");
      slotWindow.textContent = winningNumber;

      renderWinners();
      renderBalls();

      if (remainingNumbers.length === 0) {
        status.textContent = `Winning number: ${winningNumber} • Game complete`;
        spinBtn.disabled = true;
      } else {
        status.textContent = `Winning number: ${winningNumber}`;
        spinBtn.disabled = false;
      }

      spinning = false;
    }

    spinBtn.addEventListener("click", spin);

    renderWinners();
    renderBalls();
  </script>
</body>
</html>
